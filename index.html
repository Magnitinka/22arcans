        * { box-sizing: border-box; margin: 0; padding: 0; }

            border: none;
            line-height: 1;
            z-index: 10;
            background: rgba(220, 200, 180, 0.8);
            padding: 0 10px;
            border-radius: 30px;

        .modal-close:hover {

        }

            margin: 16px 0;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #7a5f44;
            font-size: 0.85rem;
            border-top: 1px solid #bfa68a;
            padding-top: 15px;

        img: 'https://arcantaro.ru/deck/1/deck-img/rider/0.jpg',
        desc: `Архетип: Вечный странник, божественный ребёнок, тот, кто начинает с нуля.

Он стоит на краю обрыва, и ветер играет его волосами. Белый цветок в руке — единственное, что он взял в путь. За спиной — солнце, а у ног — собака, которая готова укусить его за пятку, если он слишком задержится. Шут не знает, куда идёт, и это его главная сила. Каждый его шаг — танец с неизвестностью. Даже падение для него станет не поражением, а новым взлётом. Этот аркан приходит в вашу жизнь, когда Вселенная говорит: «Начни заново. Сотри всё, что было. Ты — чистый лист, и я напишу на тебе новую историю».

В работе и карьере: Шут приносит ветер перемен. Это может быть увольнение с работы, которая давно стала клеткой, или неожиданное предложение, от которого захватывает дух. Он благоволит фрилансерам, творческим людям, тем, кто готов рискнуть и начать своё дело. Но помните: вместе с ветром свободы приходит и отсутствие стабильности. Дисциплина — не конёк Шута, и если вы не научитесь её приручать, ваш талант может остаться лишь игрой.

В личной жизни и отношениях: Шут любит легко, без обязательств, как ребёнок, который радуется новой игрушке. Он может предложить вам руку и сердце через час после знакомства и исчезнуть на следующий день, потому что его внимание переключилось на что-то более интересное. Отношения с Шутом — это приключение, но они редко приводят к созданию семьи. Если вы ищете стабильность — смотрите в другую сторону. Если вы ищете искру — Шут зажжёт её так, что вы ещё долго будете чувствовать тепло.

В перевёрнутом положении тот же путник, но он вцепился в перила. Он боится сделать шаг, боится упасть, боится жить. Его страхи сковали волю, а бесконечные «а что, если» парализуют разум. Он топчется на месте, время уходит, а он всё ждёт идеального момента. Инфантильность, капризы, нежелание брать ответственность за свою жизнь — вот тени перевёрнутого Шута.

Кармический смысл: Шут указывает на начало нового кармического цикла. Ваша душа пришла в это воплощение, чтобы начать с чистого листа. Особое значение этот аркан имеет для тех, кто в прошлых жизнях был слишком привязан к материальному или к власти над другими. Теперь вам даётся шанс пройти путь иначе — как ребёнок, который верит, что мир полон чудес. Если вы не усвоите этот урок, вам придётся начать всё заново в следующем воплощении.`

    // 1 – МАГ
    {
        number: 1,
        name: 'Маг',
        img: 'https://arcantaro.ru/deck/1/deck-img/rider/1.jpg',
        desc: `Архетип: Творец, алхимик, властелин своей судьбы, тот, кто превращает слова в дела.

Перед вами человек, который держит в руках все четыре стихии. Жезл, кубок, меч, пентакль — он владеет ими, а не они им. Над его головой — знак бесконечности, и этот знак говорит: «Я — начало и я — конец, я — создатель своей реальности». Маг знает, чего хочет, и знает, как это получить. Он не ждёт подарков от судьбы — он берёт их сам. Его воля подобна огню, его слово — закон. Когда Маг говорит, вселенная слушает.

В работе и карьере: Маг — это успех, достигнутый через концентрацию воли и умение убеждать. Юристы, врачи, высококлассные специалисты, руководители — это его стихия. Любые вложения в передовое окупаются, любые начинания приносят отдачу. Маг может любой конфликт превратить во взаимовыгодный компромисс.

В личной жизни и отношениях: Маг — это сильная личность, которая берёт ответственность за отношения. Он требователен к партнёру, потому что требует много и от себя. Но если он полюбил — он будет защищать и вести за собой. Гармония и взаимопонимание возникают, когда партнёр готов принять его силу и не пытаться её подавить.

В перевёрнутом положении его инструменты разбросаны. Он потерял связь с источниками силы. Вместо магии — поза, вместо настоящих знаний — поверхностная эрудиция. Он хочет казаться тем, кем не является. Он ленится работать над собой и обманывает других, чтобы скрыть свою пустоту.

Кармический смысл: В прошлых воплощениях Маг уже обладал силой — возможно, даже большей, чем в этой жизни. Но он использовал её не для созидания, а для манипуляции и контроля над другими. Теперь его задача — научиться применять свою силу во благо. Чем могущественнее ваш дар, тем строже с вас спросится. Маг — это аркан, который требует осознанности. Если вы его обладатель, вы должны помнить: любое ваше слово материализуется.`
    },
    // 2 – ВЕРХОВНАЯ ЖРИЦА
    {
        number: 2,
        name: 'Верховная Жрица',
        img: 'https://arcantaro.ru/deck/1/deck-img/rider/2.jpg',
        desc: `Архетип: Хранительница завесы, мудрая женщина, интуиция, тайное знание.

Она сидит между двух колонн — чёрной и белой, жизни и смерти. За ней — завеса с гранатами, а в руках — свиток, который она никогда не разворачивает. Жрица знает всё, но не скажет ни слова. Её язык — это молчание. Её сила — в интуиции, снах, эмпатии. Она не даёт прямых ответов — она только показывает путь. И тот, кто готов идти, увидит свет за завесой. Она говорит: «Ты знаешь ответ. Просто посмотри внутрь себя».

В работе и карьере: Жрица приносит успех благодаря интуиции и умению видеть скрытое. Она благоволит аналитикам, психологам, всем, кто работает с подсознанием. Хобби легко превращается в бизнес. Женские профессии — её стихия. Но помните: её успех приходит не через активные действия, а через умение слушать внутренний голос.

В личной жизни и отношениях: Жрица — идеальная женщина. Глубокие эмоциональные связи, основанные на доверии и интуиции. Она раскрывается только перед избранным, и тот, кто получит её доверие, обретёт сокровище, которое не имеет цены. Для мужчины, которому выпадает Жрица, это знак: рядом с ним — удивительная женщина, которая чувствует его на расстоянии и знает его мысли раньше, чем он их озвучит.

В перевёрнутом положении та же завеса, но за ней — пустота. Вместо мудрости — сплетни и зависть. Женщина теряет связь со своей интуицией, не пользуется своим умом. Она замкнулась в себе и отказывается видеть очевидное.

Кармический смысл: Жрица несёт в себе мудрость, накопленную за многие воплощения. В прошлых жизнях вы могли быть хранительницей знаний — жрицей, ведуньей, шаманкой. Теперь ваша задача — не потерять этот дар в суете мира. Доверяйте своей интуиции, даже если она противоречит логике. Она не ошибается. Вы ошибаетесь, когда не слушаете её.`
    },
    // 3 – ИМПЕРАТРИЦА
    {
        number: 3,
        name: 'Императрица',
        img: 'https://arcantaro.ru/deck/1/deck-img/rider/3.jpg',
        desc: `Архетип: Мать, создательница, хранительница очага, изобилие.

Она восседает на троне среди колосьев, её платье расшито гранатами, а корона украшена двенадцатью звёздами. Всё вокруг неё цветёт и плодоносит. Императрица — это сама жизнь, сама природа, сама любовь. Она не просто рождает детей — она рождает идеи, проекты, бизнес, вдохновение. Даже если десять лет в гражданском браке, она всё равно узаконит отношения, потому что её суть — создавать прочные и долговечные связи.

В работе и карьере: Императрица — это успех в любых начинаниях, связанных с созданием нового. Открытие бизнеса, запуск проекта, начало карьеры — она приносит удачу и изобилие. Хорошие контакты, взаимовыгодное партнёрство, стабильный доход. Всё, за что она берётся, процветает.

В личной жизни и отношениях: Счастливый брак, крепкая семья, появление детей — вот что несёт Императрица. Это карта глубокой любви, нежности и заботы. Если вы в одиночестве — она предвещает встречу с человеком, который станет надёжным партнёром. Если вы в браке — она укрепляет союз и приносит детей.

В перевёрнутом положении она превращается в мачеху. Власть становится тиранией, забота — контролем. Наступает бесплодие, появляется злость на детей, разрушаются отношения с родными. Женщина подавляет близких своей «заботой» и не даёт им дышать.

Кармический смысл: Ваша задача в этом воплощении — проявлять заботу, созидать, рождать новое. Это не обязательно касается детей — это могут быть проекты, идеи, бизнес. Но если вы отказываетесь от своей творческой природы, карма настигает вас проблемами с зачатием или отношениями с близкими.`

В работе и карьере: Император — это карьерный рост, подписание важных документов, занятие руководящих должностей. Создание структуры из хаоса — его главный талант. Он строит империи, организует процессы, наводит порядок. В его руках всё становится системой.

В личной жизни и отношениях: Он станет отцом, мужем, защитником. Если женщина получает Императора в раскладе, это знак: она встретит надёжного мужчину, который позовёт её замуж. В отношениях — стабильность, порядок, но иногда и жёсткость, которая может казаться излишней.

В перевёрнутом положении Император становится тираном, который потерял контроль над собой. Он скорее дед, чем отец. Не берёт на себя ответственность, не может быть опорой. Его империя рушится, а он отказывается это признать.

Кармический смысл: Вы пришли в это воплощение, чтобы научиться нести ответственность. За себя, за близких, за свой мир. Если в прошлых жизнях вы злоупотребляли властью, теперь вам придётся расплачиваться за это — или отказом от власти, или необходимостью заслуживать её снова и снова.`

    {
        number: 5,
        name: 'Иерофант (Верховный Жрец)',
        img: 'https://arcantaro.ru/deck/1/deck-img/rider/5.jpg',

// ФУНКЦИЯ ДЛЯ КРАСИВОГО ФОРМАТИРОВАНИЯ ТЕКСТА
// -------------------------------------------------------------
function formatDescription(text) {
    // Сопоставляем ключевые слова с эмодзи
    const sections = {
        'Архетип:': { emoji: '🎭', title: 'Архетип' },
        'В работе и карьере:': { emoji: '💼', title: 'В работе и карьере' },
        'В личной жизни и отношениях:': { emoji: '❤️', title: 'В личной жизни и отношениях' },
        'В перевёрнутом положении:': { emoji: '🔄', title: 'В перевёрнутом положении' },
        'Кармический смысл:': { emoji: '🕯️', title: 'Кармический смысл' }
    };

    // Разбиваем текст на строки
    const lines = text.split('\n');
    let formatted = '';
    let currentSection = null;

    for (let line of lines) {
        const trimmed = line.trim();
        if (trimmed === '') {
            formatted += '<br>';
            continue;
        }

        // Проверяем, является ли строка заголовком раздела
        let matched = false;
        for (const [key, value] of Object.entries(sections)) {
            if (trimmed.startsWith(key)) {
                // Заголовок: выделяем жирным, добавляем эмодзи
                const rest = trimmed.substring(key.length).trim();
                formatted += `<b>${value.emoji} ${value.title}:</b> ${rest}<br>`;
                matched = true;
                break;
            }
        }

        if (!matched) {
            // Обычный текст
            formatted += trimmed + '<br>';
        }
    }

    return formatted;
}

// ПОСТРОЕНИЕ ГАЛЕРЕИ
// -------------------------------------------------------------
function buildGallery() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    ARCANES.forEach(arc => {
        const div = document.createElement('div');
        div.className = 'card-item';
        div.innerHTML = `
            <img src="${arc.img}" alt="${arc.name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22150%22%3E%3Crect width=%22100%22 height=%22150%22 fill=%22%23e8d5c0%22/%3E%3Ctext x=%2250%22 y=%2275%22 text-anchor=%22middle%22 fill=%22%232c1e12%22 font-size=%2214%22%3E${arc.name}%3C/text%3E%3C/svg%3E'">
            <span class="card-number">${arc.number}</span>
            <span class="card-name">${arc.name}</span>
        `;
        div.addEventListener('click', () => openModal(arc));
        gallery.appendChild(div);
    });
}

// -------------------------------------------------------------
// МОДАЛЬНОЕ ОКНО
// -------------------------------------------------------------
function openModal(arcane) {
    const modal = document.getElementById('modal');
    document.getElementById('modalImg').src = arcane.img;
    document.getElementById('modalTitle').textContent = `${arcane.number} – ${arcane.name}`;
    const formatted = formatDescription(arcane.desc);
    document.getElementById('modalDesc').innerHTML = formatted;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.body.style.overflow = 'auto';
}

function closeModalOutside(event) {
    if (event.target === document.getElementById('modal')) {
        closeModal();
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeModal();
    }
});

// -------------------------------------------------------------
// ЗАПУСК
// -------------------------------------------------------------
buildGallery();
</script>
